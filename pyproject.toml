# Black configuration for Wall-e 2.0
# https://black.readthedocs.io/en/stable/usage_and_configuration/the_basics.html

[tool.black]
line-length = 120
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | __pycache__
  | \.qwen
  | \.idea
)/
'''

[tool.isort]
profile = "black"
line_length = 120
known_first_party = ["bot", "database", "utils"]
skip = [".git", ".venv", "venv", "__pycache__", ".qwen"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Start with false, enable later
disallow_incomplete_defs = false
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = [
    "environs.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --cov=bot --cov=database --cov-report=term-missing"
